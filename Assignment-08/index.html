<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RGB Color Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-left">
      <span class="star">✦</span>
      <h1 class="site-title">RGB COLOR STUDIO</h1>
    </div>
    <div class="mode-toggle" role="group" aria-label="Mixing mode">
      <button class="mode-btn active" id="btnLight" data-mode="light">LIGHT MODE</button>
      <button class="mode-btn" id="btnPaint" data-mode="paint">PAINT MODE</button>
    </div>
  </header>

  <!-- MAIN BODY -->
  <div class="studio-body">

    <!-- CANVAS AREA -->
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="mixCanvas" aria-label="Color mixing canvas"></canvas>
      <!-- Eyedropper floating preview -->
      <div class="eyedrop-preview" id="eyedropPreview" aria-hidden="true"></div>
    </div>

    <!-- PALETTE SIDEBAR -->
    <aside class="palette-sidebar" aria-label="Color palette">

      <h2 class="sidebar-title">PALETTE</h2>

      <!-- User palette slots -->
      <div class="palette-slots" id="paletteSlots" aria-live="polite">
        <!-- Filled dynamically -->
      </div>

      <!-- Suggestions -->
      <div class="suggestions-section" id="suggestionsSection">
        <div class="suggestions-divider">— SUGGESTIONS —</div>
        <div class="suggestions-list" id="suggestionsList">
          <p class="suggestions-empty" id="suggestionsEmpty">ADD A COLOR TO SEE SUGGESTIONS</p>
        </div>
      </div>

    </aside>
  </div>

  <!-- BOTTOM TOOLBAR -->
  <div class="bottom-toolbar">
    <div class="intensity-group">
      <div class="intensity-row" id="intensityRow0">
        <label class="intensity-label" id="label0" for="slider0">RED</label>
        <input type="range" class="intensity-slider" id="slider0" min="0.05" max="1" step="0.01" value="1" aria-label="Circle 1 intensity" />
        <span class="intensity-pct" id="pct0">100%</span>
      </div>
      <div class="intensity-row" id="intensityRow1">
        <label class="intensity-label" id="label1" for="slider1">GREEN</label>
        <input type="range" class="intensity-slider" id="slider1" min="0.05" max="1" step="0.01" value="1" aria-label="Circle 2 intensity" />
        <span class="intensity-pct" id="pct1">100%</span>
      </div>
      <div class="intensity-row" id="intensityRow2">
        <label class="intensity-label" id="label2" for="slider2">BLUE</label>
        <input type="range" class="intensity-slider" id="slider2" min="0.05" max="1" step="0.01" value="1" aria-label="Circle 3 intensity" />
        <span class="intensity-pct" id="pct2">100%</span>
      </div>
    </div>

    <div class="toolbar-actions">
      <button class="reset-btn" id="resetBtn" aria-label="Reset all intensities">RESET INTENSITIES</button>
      <button class="pick-btn" id="pickBtn" aria-label="Toggle eyedropper color picker">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M13.7 1.3a1 1 0 0 0-1.4 0L10 3.6l-.7-.7a1 1 0 0 0-1.4 1.4l.7.7-6.3 6.3A1 1 0 0 0 2 12v2h2a1 1 0 0 0 .7-.3l6.3-6.3.7.7a1 1 0 0 0 1.4-1.4l-.7-.7 2.3-2.3a1 1 0 0 0 0-1.4z"/>
        </svg>
        PICK COLOR
      </button>
      <div class="pick-warning" id="pickWarning" aria-live="assertive"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
