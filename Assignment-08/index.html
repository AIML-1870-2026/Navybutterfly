<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RGB Petal Wheel Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <span class="star">✦</span>
    <h1>RGB PETAL WHEEL EXPLORER</h1>
    <span class="star">✦</span>
  </header>

  <main class="main-panels">
    <!-- LEFT PANEL: Petal Wheel -->
    <section class="panel panel-wheel" aria-label="Petal Wheel Panel">
      <h2 class="panel-title">PETAL WHEEL</h2>

      <div class="wheel-container">
        <svg id="petalWheel" viewBox="0 0 320 320" width="320" height="320" aria-label="Color petal wheel">
          <defs>
            <radialGradient id="grad-red" cx="50%" cy="85%" r="85%" fx="50%" fy="85%">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="45%" stop-color="#ff0000" />
              <stop offset="100%" stop-color="#0a0005" />
            </radialGradient>
            <radialGradient id="grad-yellow" cx="50%" cy="85%" r="85%" fx="50%" fy="85%">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="45%" stop-color="#ffff00" />
              <stop offset="100%" stop-color="#0a0a00" />
            </radialGradient>
            <radialGradient id="grad-green" cx="50%" cy="85%" r="85%" fx="50%" fy="85%">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="45%" stop-color="#00ff00" />
              <stop offset="100%" stop-color="#000a00" />
            </radialGradient>
            <radialGradient id="grad-cyan" cx="50%" cy="85%" r="85%" fx="50%" fy="85%">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="45%" stop-color="#00ffff" />
              <stop offset="100%" stop-color="#000a0a" />
            </radialGradient>
            <radialGradient id="grad-blue" cx="50%" cy="85%" r="85%" fx="50%" fy="85%">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="45%" stop-color="#0000ff" />
              <stop offset="100%" stop-color="#00000a" />
            </radialGradient>
            <radialGradient id="grad-magenta" cx="50%" cy="85%" r="85%" fx="50%" fy="85%">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="45%" stop-color="#ff00ff" />
              <stop offset="100%" stop-color="#0a000a" />
            </radialGradient>
          </defs>
          <g id="wheelGroup" class="wheel-group">
            <!-- Red petal: 0° -->
            <ellipse cx="160" cy="72" rx="36" ry="96" fill="url(#grad-red)" transform="rotate(0, 160, 160)" opacity="0.92"/>
            <!-- Yellow petal: 60° -->
            <ellipse cx="160" cy="72" rx="36" ry="96" fill="url(#grad-yellow)" transform="rotate(60, 160, 160)" opacity="0.92"/>
            <!-- Green petal: 120° -->
            <ellipse cx="160" cy="72" rx="36" ry="96" fill="url(#grad-green)" transform="rotate(120, 160, 160)" opacity="0.92"/>
            <!-- Cyan petal: 180° -->
            <ellipse cx="160" cy="72" rx="36" ry="96" fill="url(#grad-cyan)" transform="rotate(180, 160, 160)" opacity="0.92"/>
            <!-- Blue petal: 240° -->
            <ellipse cx="160" cy="72" rx="36" ry="96" fill="url(#grad-blue)" transform="rotate(240, 160, 160)" opacity="0.92"/>
            <!-- Magenta petal: 300° -->
            <ellipse cx="160" cy="72" rx="36" ry="96" fill="url(#grad-magenta)" transform="rotate(300, 160, 160)" opacity="0.92"/>
          </g>
          <!-- Marker dot -->
          <circle id="wheelMarker" cx="160" cy="160" r="8" fill="white" class="wheel-marker"/>
        </svg>
      </div>

      <!-- Primary selectors -->
      <div class="primary-selectors" aria-label="Primary color selectors">
        <span class="selector-label">PRIMARIES (pick 2):</span>
        <div class="selector-buttons">
          <button class="primary-btn active" id="btn-r" data-channel="r" aria-pressed="true">R</button>
          <button class="primary-btn active" id="btn-g" data-channel="g" aria-pressed="true">G</button>
          <button class="primary-btn" id="btn-b" data-channel="b" aria-pressed="false">B</button>
        </div>
      </div>

      <!-- Sliders -->
      <div class="sliders-section">
        <div class="slider-row" id="slider-row-r">
          <label class="slider-label" for="slider-r">
            <span class="channel-dot dot-r"></span>RED
          </label>
          <input type="range" id="slider-r" class="slider slider-r" min="0" max="255" value="255" aria-label="Red 0-255" />
          <span class="slider-value" id="val-r">255</span>
          <span class="constrained-tag" id="tag-r"></span>
        </div>
        <div class="slider-row" id="slider-row-g">
          <label class="slider-label" for="slider-g">
            <span class="channel-dot dot-g"></span>GRN
          </label>
          <input type="range" id="slider-g" class="slider slider-g" min="0" max="255" value="128" aria-label="Green 0-255" />
          <span class="slider-value" id="val-g">128</span>
          <span class="constrained-tag" id="tag-g"></span>
        </div>
        <div class="slider-row" id="slider-row-b">
          <label class="slider-label" for="slider-b">
            <span class="channel-dot dot-b"></span>BLU
          </label>
          <input type="range" id="slider-b" class="slider slider-b" min="0" max="255" value="0" aria-label="Blue 0-255" />
          <span class="slider-value" id="val-b">0</span>
          <span class="constrained-tag" id="tag-b">CONSTRAINED</span>
        </div>
      </div>

      <!-- Mixed color preview -->
      <div class="preview-section">
        <div class="preview-box" id="colorPreview" aria-live="polite"></div>
        <div class="preview-codes">
          <span class="preview-hex" id="previewHex">HEX #FF8000</span>
          <span class="preview-rgb" id="previewRGB">RGB(255, 128, 0)</span>
          <button class="copy-btn" id="copyHexBtn" aria-label="Copy hex code" title="Copy hex">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <rect x="4" y="4" width="9" height="11" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/>
              <rect x="2" y="2" width="9" height="11" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/>
            </svg>
            <span class="copy-label" id="copyLabel">COPY</span>
          </button>
        </div>
      </div>
    </section>

    <!-- RIGHT PANEL: Palette Generator -->
    <section class="panel panel-palette" aria-label="Palette Generator Panel">
      <h2 class="panel-title">PALETTE GENERATOR</h2>

      <div class="harmony-buttons" role="group" aria-label="Harmony type">
        <button class="harmony-btn active" data-harmony="complement">COMPLEMENT</button>
        <button class="harmony-btn" data-harmony="analogous">ANALOGOUS</button>
        <button class="harmony-btn" data-harmony="triadic">TRIADIC</button>
        <button class="harmony-btn" data-harmony="split-comp">SPLIT-COMP</button>
        <button class="harmony-btn" data-harmony="tetradic">TETRADIC</button>
      </div>

      <div class="palette-swatches" id="paletteSwatches" aria-label="Color swatches"></div>

      <div class="ui-preview" id="uiPreview" aria-label="UI context preview">
        <div class="ui-prev-card" id="uiCard">
          <div class="ui-prev-heading" id="uiHeading">UI PREVIEW</div>
          <div class="ui-prev-body" id="uiBody">Sample text in palette colors.</div>
          <button class="ui-prev-btn" id="uiBtn">ACTION</button>
        </div>
      </div>

      <div class="palette-actions">
        <button class="randomize-btn" id="randomizeBtn" aria-label="Randomize palette">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true">
            <path d="M2 6h2l2-2h6l2 2h2v2h-2l-2-2H6L4 8H2V6zm0 6h2l2 2h6l2-2h2v-2h-2l-2 2H6l-2-2H2v2zm12-7l2 4-2 4"/>
            <path d="M11 5l3 4-3 4M7 5L4 9l3 4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>
          </svg>
          RANDOMIZE
        </button>
      </div>
    </section>
  </main>

  <!-- STRETCH: Accessibility Toolbar -->
  <section class="accessibility-toolbar" id="accessibilityToolbar" aria-label="Accessibility tools">
    <button class="toolbar-toggle" id="toolbarToggle" aria-expanded="false" aria-controls="toolbarContent">
      ▼ ACCESSIBILITY TOOLS
    </button>
    <div class="toolbar-content" id="toolbarContent" hidden>
      <div class="toolbar-tabs" role="tablist">
        <button class="tab-btn active" role="tab" data-tab="contrast" aria-selected="true">CONTRAST CHECKER</button>
        <button class="tab-btn" role="tab" data-tab="colorblind" aria-selected="false">COLOR BLINDNESS SIM</button>
      </div>

      <!-- Contrast Checker -->
      <div class="tab-panel active" id="tab-contrast" role="tabpanel">
        <div class="contrast-wells">
          <div class="color-well">
            <label class="well-label" for="fgColor">FOREGROUND</label>
            <div class="well-swatch" id="fgSwatch"></div>
            <input type="text" class="well-input" id="fgColor" maxlength="7" value="#FF8000" aria-label="Foreground color hex" />
          </div>
          <button class="swap-btn" id="swapColorsBtn" aria-label="Swap foreground and background">⇄ SWAP</button>
          <div class="color-well">
            <label class="well-label" for="bgColor">BACKGROUND</label>
            <div class="well-swatch" id="bgSwatch"></div>
            <input type="text" class="well-input" id="bgColor" maxlength="7" value="#0080FF" aria-label="Background color hex" />
          </div>
        </div>
        <div class="contrast-result" id="contrastResult">
          <div class="contrast-ratio" id="contrastRatio">—</div>
          <div class="wcag-badges" id="wcagBadges"></div>
        </div>
      </div>

      <!-- Color Blindness Simulator -->
      <div class="tab-panel" id="tab-colorblind" role="tabpanel" hidden>
        <div class="cbsim-grid" id="cbSimGrid"></div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
